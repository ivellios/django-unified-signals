name: Release

on:
  workflow_dispatch:

permissions: read-all

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    concurrency:
      group: release
      cancel-in-progress: false

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@master
      with:
        fetch-depth: 0

    - name: Semantic Version Release
      uses: python-semantic-release/python-semantic-release@v10.6.1
      with:
        github_token: ${{ secrets.RELEASE_TOKEN }}
        git_committer_name: "github-actions[bot]"
        git_committer_email: "github-actions[bot]@users.noreply.github.com"

    - name: Set up Python
      uses: actions/setup-python@master
      with:
        python-version: '3.12'

    - name: Install uv
      run: pip install uv

    - name: Sync uv.lock version
      env:
        GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      run: |
        uv lock --upgrade-package django-unified-signals
        if git diff --quiet -- uv.lock; then
          echo "uv.lock already in sync"
          exit 0
        fi
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add uv.lock
        git commit -m "chore: sync uv.lock version"
        git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" HEAD:master
