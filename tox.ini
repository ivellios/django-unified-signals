[tox]
isolated_build = true
envlist =
    ruff-format
    ruff-lint
    safety
    liccheck
    mypy
    coverage
    py{3.11,3.12,3.13}-dj{5.2,6.0}

[testenv]
allowlist_externals = uv
deps =
    coverage
commands_pre =
    uv sync
    dj5.2: uv pip install "Django>=5.2,<5.3"
    dj6.0: uv pip install "Django>=6.0,<6.1"
commands =
    uv run python manage.py --version
    uv run pytest --cov=src/unified_signals tests/


[testenv:safety]
basepython = python3.12
deps = safety
commands = safety check --ignore=70612 --ignore=71608


[testenv:mypy]
basepython = python3.12
commands =
    uv run mypy tests src/unified_signals


[testenv:ruff-format]
basepython = python3.12
commands =
    uv run ruff format --check tests src/unified_signals


[testenv:ruff-lint]
basepython = python3.12
commands =
    uv run ruff check tests src/unified_signals


[testenv:liccheck]
basepython = python3.12
deps = liccheck
commands =
    uv export --no-default-groups --format requirements-txt --output-file {envtmpdir}/requirements.txt
    liccheck -r {envtmpdir}/requirements.txt -l PARANOID


[testenv:coverage]
commands =
    uv run pytest --cov=src/unified_signals tests/
